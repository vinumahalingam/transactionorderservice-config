spring:
  application:
    name: customerprofile-api
    
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: false

logging:
  level:
    com:
      customerprofile: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
  file:
    name: logs/customerprofile.log
    path: ./logs
server:
  port: 8080